name: Publish package

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Set up Python 3.11
        run: uv python install 3.11
      - name: Build package
        run: uv build
      - name: Publish package
        run: uv publish --trusted-publishing always
